name: Android CI/CD

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build variant'
        required: true
        default: 'onlyXfce4'
        type: choice
        options:
          - onlyXfce4
          - All
          - both

env:
  JAVA_VERSION: '17'

jobs:
  build-onlyxfce4:
    name: Build onlyXfce4 APK
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'onlyXfce4' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build onlyXfce4 APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PminSdk=26 \
            -PtargetSdk=28 \
            --no-daemon \
            --stacktrace

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US" 2>/dev/null
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out Linbox-WinEmu-onlyXfce4.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          ls -lh Linbox-WinEmu-onlyXfce4.apk

      - name: Upload onlyXfce4 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linbox-WinEmu-onlyXfce4
          path: Linbox-WinEmu-onlyXfce4.apk
          retention-days: 30

      - name: Publish to GitHub Release (nightly)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          files: Linbox-WinEmu-onlyXfce4.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-all:
    name: Build All APK (with rootfs)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'All' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc || true
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true
          sudo rm -rf /usr/local/lib/android/sdk/system-images || true
          sudo chmod -R 777 /usr/local/lib/android || true
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download cached rootfs from Assets release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading rootfs.tar.xz from Assets release..."
          gh release download assets \
            --repo ${{ github.repository }} \
            --pattern "rootfs.tar.xz" \
            --dir app/src/main/assets/
          ls -lh app/src/main/assets/rootfs.tar.xz

      - name: Build All APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PminSdk=26 \
            -PtargetSdk=28 \
            --no-daemon \
            --stacktrace

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US" 2>/dev/null
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out Linbox-WinEmu-All.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          ls -lh Linbox-WinEmu-All.apk

      - name: Upload All APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linbox-WinEmu-All
          path: Linbox-WinEmu-All.apk
          retention-days: 30

      - name: Publish to GitHub Release (nightly)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          files: Linbox-WinEmu-All.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
