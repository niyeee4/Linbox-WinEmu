name: Android CI/CD

on:
  workflow_dispatch:  # 仅允许手动触发构建

env:
  JAVA_VERSION: '11'  # 项目要求的Java版本
  GRADLE_VERSION: '8.4'
  ANDROID_COMPILE_SDK: '35'
  ANDROID_BUILD_TOOLS_VERSION: '35.0.0'
  ANDROID_SDK_VERSION: '28'  # Target SDK

jobs:
  # ============================================
  # 调试版本构建
  # ============================================
  debug-build:
    name: Debug Build - API ${{ matrix.api_level }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        api_level: [26, 28, 34]
        include:
          - api_level: 26
            min_sdk: 26
          - api_level: 28
            min_sdk: 26
          - api_level: 34
            min_sdk: 26
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}
      
      # 设置 Java 17 用于 Android SDK 工具
      - name: Set up JDK 17 for SDK tools
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # 设置 Android SDK（使用 v3）
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ matrix.api_level }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          cmdline-tools: 'latest'
      
      # 切换回 Java 11 用于构建
      - name: Set up JDK ${{ env.JAVA_VERSION }} for build
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Prepare Gradle
        run: |
          chmod +x gradlew
          ./gradlew --version
      
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            -PminSdk=${{ matrix.min_sdk }} \
            -PtargetSdk=${{ matrix.api_level }} \
            --no-daemon \
            --stacktrace
        env:
          ORG_GRADLE_PROJECT_DEVELOPMENT_TEAM: ""
      
      - name: Rename debug APK
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            VERSION_CODE=$(grep -oP '(?<=versionCode = )\d+' app/build.gradle.kts || echo "1")
            VERSION_NAME=$(grep -oP '(?<=versionName = ")[^"]+' app/build.gradle.kts || echo "1.0")
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BRANCH_NAME=${BRANCH_NAME//\//-}
            NEW_NAME="WinEmulator-${BRANCH_NAME}-v${VERSION_NAME}-${VERSION_CODE}-api${{ matrix.api_level }}-unsigned.apk"
            mv app/build/outputs/apk/debug/app-debug.apk "$NEW_NAME"
            echo "APK_FILE=$NEW_NAME" >> $GITHUB_ENV
            echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
            echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          fi
      
      - name: Upload debug APK
        if: env.APK_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-api${{ matrix.api_level }}-unsigned
          path: ${{ env.APK_FILE }}
          retention-days: 7
          if-no-files-found: error

  # ============================================
  # 发布版本构建
  # ============================================
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}
      
      # 设置 Java 17 用于 SDK 工具
      - name: Set up JDK 17 for SDK tools
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          cmdline-tools: 'latest'
      
      # 切换回 Java 11
      - name: Set up JDK ${{ env.JAVA_VERSION }} for build
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Prepare Gradle
        run: |
          chmod +x gradlew
          ./gradlew --version
      
      - name: Configure signing
        run: |
          cat >> gradle.properties << EOF
          
          android.signingConfigs.debug.storeFile=debug.keystore
          android.signingConfigs.debug.storePassword=android
          android.signingConfigs.debug.keyAlias=androiddebugkey
          android.signingConfigs.debug.keyPassword=android
          EOF
          
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" 2>/dev/null || true
      
      - name: Modify build config for unsigned release
        run: |
          cp app/build.gradle.kts app/build.gradle.kts.bak
          sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/g' app/build.gradle.kts
          sed -i 's/getDefaultProguardFile("proguard-android-optimize.txt")/getDefaultProguardFile("proguard-android-optimize.txt")\n            signingConfig = signingConfigs.debug/g' app/build.gradle.kts
      
      - name: Build release APK (unsigned with debug key)
        run: |
          ./gradlew assembleRelease \
            -PminSdk=26 \
            -PtargetSdk=${{ env.ANDROID_SDK_VERSION }} \
            -PminifyEnabled=false \
            --no-daemon \
            --stacktrace
        env:
          ORG_GRADLE_PROJECT_DEVELOPMENT_TEAM: ""
      
      - name: Rename release APK
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            VERSION_CODE=$(grep -oP '(?<=versionCode = )\d+' app/build.gradle.kts || echo "1")
            VERSION_NAME=$(grep -oP '(?<=versionName = ")[^"]+' app/build.gradle.kts || echo "1.0")
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BRANCH_NAME=${BRANCH_NAME//\//-}
            NEW_NAME="WinEmulator-${BRANCH_NAME}-v${VERSION_NAME}-${VERSION_CODE}-release-unsigned.apk"
            mv app/build/outputs/apk/release/app-release.apk "$NEW_NAME"
            echo "APK_FILE=$NEW_NAME" >> $GITHUB_ENV
            echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
            echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
            echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          fi
      
      - name: Restore original build config
        run: |
          mv app/build.gradle.kts.bak app/build.gradle.kts
      
      - name: Upload release APK
        if: env.APK_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-unsigned
          path: ${{ env.APK_FILE }}
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # 代码质量检查
  # ============================================
  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      # 设置 Java 17 用于 SDK 工具
      - name: Set up JDK 17 for SDK tools
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          cmdline-tools: 'latest'
      
      - name: Set up JDK ${{ env.JAVA_VERSION }} for build
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Run lint
        run: |
          chmod +x gradlew
          ./gradlew lint --no-daemon
      
      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  # ============================================
  # 单元测试
  # ============================================
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      # 设置 Java 17 用于 SDK 工具
      - name: Set up JDK 17 for SDK tools
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          cmdline-tools: 'latest'
      
      - name: Set up JDK ${{ env.JAVA_VERSION }} for build
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --no-daemon
      
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/*.html
          retention-days: 7

  # ============================================
  # 构建汇总
  # ============================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [debug-build, release-build, lint, unit-test]
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "## 构建结果汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.debug-build.result }}" == "success" ]; then
            echo "✅ 调试版本构建: 成功" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.debug-build.result }}" == "skipped" ]; then
            echo "⏭️ 调试版本构建: 跳过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 调试版本构建: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.release-build.result }}" == "success" ]; then
            echo "✅ 发布版本构建: 成功" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.release-build.result }}" == "skipped" ]; then
            echo "⏭️ 发布版本构建: 跳过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 发布版本构建: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "✅ 代码检查: 通过" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.lint.result }}" == "skipped" ]; then
            echo "⏭️ 代码检查: 跳过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 代码检查: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.unit-test.result }}" == "success" ]; then
            echo "✅ 单元测试: 通过" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.unit-test.result }}" == "skipped" ]; then
            echo "⏭️ 单元测试: 跳过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 单元测试: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**触发事件:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**分支:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**注意:** 构建的APK文件未经过正式签名，请在发布前使用MT管理器进行签名。" >> $GITHUB_STEP_SUMMARY